spring.application.name=PaITS
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/issue_tracker_db}
spring.datasource.username=${DB_USERNAME:issue_tracker}
spring.datasource.password=${DB_PASSWORD:issue_tracker_123}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Integration
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}
