<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaITS | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="auth-container animate-fade-in">
        <div class="glass-panel auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <div id="login-alert" class="alert"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Don't have an account? <a href="/register.html" style="color: var(--primary-color); text-decoration: none;">Register</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            try {
                btn.textContent = 'Loading...';
                btn.disabled = true;
                const res = await UserAPI.login(email, password);
                
                if (res.token) {
                    tokenManager.setToken(res.token);
                    if (tokenManager.getRole() === 'ADMIN') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/home.html';
                    }
                }
            } catch (error) {
                UI.showAlert('login-alert', error.message || 'Login failed', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
