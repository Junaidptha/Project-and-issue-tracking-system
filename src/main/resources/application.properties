spring.application.name=PaITS

# Load .env file for local development
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/issue_tracker_db}
spring.datasource.username=${DB_USERNAME:issue_tracker}
spring.datasource.password=${DB_PASSWORD:issue_tracker_123}

# HikariCP pool limits (required for Supabase free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Integration
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}
