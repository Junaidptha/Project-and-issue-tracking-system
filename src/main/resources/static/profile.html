<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaITS | My Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        if (!localStorage.getItem('token')) window.location.href = '/login.html';
    </script>
    <style>
        body { background: var(--bg-color); }

        .profile-shell {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Cover */
        .profile-cover {
            height: 180px;
            background: linear-gradient(135deg, #111 0%, #2a2a2a 50%, #111 100%);
            border-radius: 12px 12px 0 0;
            position: relative;
        }

        .profile-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            margin-bottom: 1.5rem;
        }

        .profile-avatar-wrap {
            position: absolute;
            bottom: -44px;
            left: 2rem;
        }

        .profile-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #222;
            border: 4px solid var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            text-transform: uppercase;
            user-select: none;
        }

        .profile-meta {
            padding: 3.5rem 2rem 2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .profile-meta-left h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .profile-handle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.75rem; }

        .role-badge {
            display: inline-flex;
            align-items: center;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            letter-spacing: 0.05em;
        }

        /* Two-column layout */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
        }
        @media (max-width: 700px) {
            .profile-grid { grid-template-columns: 1fr; }
        }

        /* Sidebar sections */
        .section-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 1.25rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row { margin-bottom: 0.75rem; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin-bottom: 0.2rem; font-weight: 600; }
        .info-value { font-size: 0.92rem; word-break: break-all; }

        .uuid-box {
            background: var(--bg-color);
            border: 1px dashed var(--border-color);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-family: monospace;
            word-break: break-all;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: none; border: 1px solid var(--border-color);
            color: var(--text-secondary); padding: 0.2rem 0.6rem;
            font-size: 0.75rem; border-radius: 4px; cursor: pointer;
            margin-top: 0.4rem; transition: all 0.15s;
        }
        .copy-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }

        /* Skills preview */
        .skills-display { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
        .skill-tag {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 0.25rem 0.7rem;
            font-size: 0.8rem; font-weight: 500;
        }

        /* Edit form */
        .form-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-secondary);
            margin: 1.5rem 0 0.75rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .form-section-title:first-child { margin-top: 0; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; }
        .form-group input, .form-group textarea {
            width: 100%; box-sizing: border-box;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .danger-zone {
            margin-top: 1.5rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            background: rgba(239, 68, 68, 0.03);
        }
        .danger-zone h3 { margin: 0 0 0.5rem 0; font-size: 1rem; color: #ef4444; }
        .danger-zone p { font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 1rem 0; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="profile-shell animate-fade-in">
        <!-- Profile Header Card -->
        <div style="position: relative; margin-bottom: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);">
            <div class="profile-cover" style="border-radius: 12px 12px 0 0; overflow: hidden;"></div>
            <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profile-avatar-initials">?</div>
            </div>
            <div class="profile-meta">
                <div class="profile-meta-left">
                    <h1 id="header-name">Loading...</h1>
                    <p class="profile-handle" id="header-handle"></p>
                    <span class="role-badge" id="header-role" style="display:none;"></span>
                </div>
            </div>
        </div>

        <!-- Main two-column layout -->
        <div class="profile-grid">
            <!-- Left Sidebar -->
            <div>
                <div class="section-card">
                    <h3 class="section-title">📋 Account Info</h3>
                    <div class="info-row">
                        <div class="info-label">Email</div>
                        <div class="info-value" id="sidebar-email"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Username</div>
                        <div class="info-value" id="sidebar-username"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Status</div>
                        <div class="info-value" id="sidebar-status"></div>
                    </div>
                </div>

                <div class="section-card">
                    <h3 class="section-title">🔑 User ID</h3>
                    <div class="uuid-box" id="sidebar-uuid"></div>
                    <button class="copy-btn" onclick="copyUUID()">📋 Copy UUID</button>
                </div>

                <div class="section-card">
                    <h3 class="section-title">🛠️ Skills</h3>
                    <div class="skills-display" id="sidebar-skills">
                        <p style="color:var(--text-secondary); font-size:0.85rem; font-style:italic; margin:0;">No skills listed yet.</p>
                    </div>
                </div>
            </div>

            <!-- Right: Edit Form -->
            <div>
                <div id="profile-alert" class="alert"></div>

                <div class="section-card">
                    <p class="form-section-title">Personal Info</p>
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" required placeholder="Your full name">
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" required placeholder="Your username">
                        </div>

                        <p class="form-section-title">About</p>
                        <div class="form-group">
                            <label for="bio">Bio</label>
                            <textarea id="bio" rows="4" placeholder="Tell your team a bit about yourself..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="skills">Skills / Technologies <span style="color:var(--text-secondary); font-weight:400;">(comma separated)</span></label>
                            <input type="text" id="skills" placeholder="e.g. Java, Spring Boot, React, PostgreSQL">
                        </div>

                        <p class="form-section-title">Security</p>
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" placeholder="Leave blank to keep current password">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
                            <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Danger Zone -->
                <div class="danger-zone">
                    <h3>Danger Zone</h3>
                    <p>Deactivating your account will immediately revoke your access. This action cannot be undone.</p>
                    <button type="button" class="btn btn-danger" id="deactivate-btn">Deactivate Account</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentUser = null;
        let profileUUID = '';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                currentUser = await UserAPI.getProfile();
                populatePage(currentUser);
            } catch (error) {
                showAlert('Failed to load profile. Please try logging in again.', 'error');
            }
        });

        function populatePage(user) {
            profileUUID = user.id;

            // Header
            document.getElementById('header-name').textContent = user.fullName || user.username;
            document.getElementById('header-handle').textContent = '@' + user.username + '  ·  ' + user.email;

            // Avatar initials
            const name = user.fullName || user.username || '?';
            const parts = name.trim().split(' ');
            const initials = parts.length >= 2
                ? parts[0][0] + parts[parts.length - 1][0]
                : name.substring(0, 2);
            document.getElementById('profile-avatar-initials').textContent = initials.toUpperCase();

            // Role badge — only show for non-MEMBER roles
            const roleBadge = document.getElementById('header-role');
            if (user.role && user.role !== 'MEMBER') {
                roleBadge.textContent = user.role;
                roleBadge.style.display = 'inline-flex';
            } else {
                roleBadge.style.display = 'none';
            }

            // Sidebar
            document.getElementById('sidebar-email').textContent = user.email;
            document.getElementById('sidebar-username').textContent = '@' + user.username;
            document.getElementById('sidebar-uuid').textContent = user.id;
            document.getElementById('sidebar-status').innerHTML = user.isActive
                ? '<span style="color:#10b981; font-weight:600;">● Active</span>'
                : '<span style="color:#ef4444; font-weight:600;">● Inactive</span>';

            // Skills preview in sidebar
            const skillsDisplay = document.getElementById('sidebar-skills');
            if (user.skills && user.skills.trim().length > 0) {
                const list = user.skills.split(',').map(s => s.trim()).filter(s => s);
                skillsDisplay.innerHTML = list.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('');
            }

            // Form fields
            document.getElementById('fullName').value = user.fullName || '';
            document.getElementById('username').value = user.username || '';
            document.getElementById('bio').value = user.bio || '';
            document.getElementById('skills').value = user.skills || '';
        }

        function resetForm() {
            if (currentUser) populatePage(currentUser);
        }

        // Live skills preview update
        document.getElementById('skills').addEventListener('input', function () {
            const skillsDisplay = document.getElementById('sidebar-skills');
            const val = this.value.trim();
            if (val.length > 0) {
                const list = val.split(',').map(s => s.trim()).filter(s => s);
                skillsDisplay.innerHTML = list.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('');
            } else {
                skillsDisplay.innerHTML = '<p style="color:var(--text-secondary); font-size:0.85rem; font-style:italic; margin:0;">No skills listed yet.</p>';
            }
        });

        // Live name update
        document.getElementById('fullName').addEventListener('input', function () {
            document.getElementById('header-name').textContent = this.value || currentUser?.username || 'Loading...';
        });

        // Update profile form
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            const userData = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value
            };

            const pass = document.getElementById('password').value;
            if (pass.trim() !== '') userData.password = pass;

            try {
                await UserAPI.updateProfile(userData);
                currentUser = { ...currentUser, ...userData };
                showAlert('Profile updated successfully! ✅', 'success');
                document.getElementById('password').value = '';
            } catch (error) {
                showAlert(error.message || 'Failed to update profile', 'error');
            } finally {
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        });

        // Deactivate
        document.getElementById('deactivate-btn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to deactivate your account? This action cannot be undone.')) {
                try {
                    await UserAPI.deactivateAccount();
                    UI.logout();
                } catch (error) {
                    showAlert(error.message || 'Failed to deactivate account', 'error');
                }
            }
        });

        function copyUUID() {
            navigator.clipboard.writeText(profileUUID).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = '📋 Copy UUID'; }, 2000);
            });
        }

        function showAlert(msg, type) {
            const el = document.getElementById('profile-alert');
            el.textContent = msg;
            el.className = `alert alert-${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
